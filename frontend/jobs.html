<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all job listings on TalentLink.">
  <title>Browse Jobs — TalentLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/output.css">
  <script>
    if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    }
  </script>
</head>
<body class="bg-[#FCFCFC] dark:bg-[#022F1F] min-h-screen">

  <!-- Navbar -->
  <nav class="bg-[#FCFCFC] dark:bg-[#022F1F] shadow-sm sticky top-0 z-50 border-b border-[#E5E7EB] dark:border-[#014421]">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <img src="./assets/images/logo.png" alt="TalentLink Logo" class="h-8 w-auto">
      <span class="text-xl font-bold text-[#222222] dark:text-white" style="font-family: Poppins, sans-serif;">
        Talent<span class="text-[#009B77]">Link</span>
      </span>
    </a>

    <!-- Desktop Nav -->
    <div class="hidden md:flex items-center gap-4">
      <a href="dashboard.html" class="text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] font-medium transition-colors text-sm">Dashboard</a>
      <a href="login.html" class="text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] font-medium transition-colors text-sm">Login</a>
      <a href="register.html" class="bg-[#009B77] text-white px-4 py-2 rounded-lg hover:bg-[#007A5E] font-medium transition-colors text-sm">Get Started</a>
      <button id="themeToggle" class="p-2 rounded-lg bg-[#D9D9D9] dark:bg-[#014421] text-[#222222] dark:text-white transition-colors">
        <span id="themeIcon">🌙</span>
      </button>
    </div>

    <!-- Mobile -->
    <div class="flex md:hidden items-center gap-2">
      <button id="themeToggleMobile" class="p-2 rounded-lg bg-[#D9D9D9] dark:bg-[#014421] text-[#222222] dark:text-white">
        <span id="themeIconMobile">🌙</span>
      </button>
      <button id="hamburger" class="p-2 rounded-lg text-[#222222] dark:text-white">
        <svg id="menuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg id="menuClose" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="md:hidden bg-[#FCFCFC] dark:bg-[#022F1F] border-t border-[#E5E7EB] dark:border-[#014421] px-4 py-4 flex flex-col gap-4">
    <a href="dashboard.html" class="text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] font-medium transition-colors">Dashboard</a>
    <a href="login.html" class="text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] font-medium transition-colors">Login</a>
    <a href="register.html" class="bg-[#009B77] text-white px-4 py-2 rounded-lg hover:bg-[#007A5E] font-medium transition-colors text-center">Get Started</a>
  </div>
</nav>
  <!-- Hero Search -->
  <div class="bg-linear-to-br from-[#014421] to-[#009B77] py-14">
    <div class="max-w-4xl mx-auto px-4 text-center">
      <h1 class="text-3xl md:text-5xl font-bold text-white mb-4" style="font-family: Poppins, sans-serif;">
        Find Your Next Opportunity
      </h1>
      <p class="text-[#D9D9D9] text-lg mb-8">Browse hundreds of jobs from top companies</p>

      <!-- Search Bar -->
      <div class="bg-white dark:bg-[#014421] rounded-xl p-3 flex flex-col md:flex-row gap-3 shadow-lg">
        <input type="text" id="searchInput" placeholder="Job title or keyword..."
          class="flex-1 px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#009B77]/30 bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white placeholder-[#4B5563] focus:outline-none focus:border-[#009B77] transition-colors">
        <select id="jobTypeFilter"
          class="px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#009B77]/30 bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white focus:outline-none focus:border-[#009B77] transition-colors">
          <option value="">All Types</option>
          <option value="Full-time">Full-time</option>
          <option value="Part-time">Part-time</option>
          <option value="Contract">Contract</option>
          <option value="Internship">Internship</option>
        </select>
        <button onclick="searchJobs()" class="bg-[#009B77] hover:bg-[#007A5E] text-white px-8 py-3 rounded-lg font-semibold transition-colors">
          Search
        </button>
      </div>
    </div>
  </div>

  <!-- Jobs Section -->
  <div class="max-w-6xl mx-auto px-4 py-10">

    <!-- Results Header -->
    <div class="flex items-center justify-between mb-6">
      <p id="resultsCount" class="text-[#4B5563] dark:text-[#D9D9D9] text-sm">Loading jobs...</p>
      <select id="sortFilter" onchange="searchJobs()"
        class="px-3 py-2 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-white dark:bg-[#014421] text-[#222222] dark:text-white text-sm focus:outline-none focus:border-[#009B77]">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>
    </div>

    <!-- Jobs Grid -->
    <div id="jobsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Jobs load here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-16">
      <p class="text-4xl mb-4">🔍</p>
      <h3 class="text-xl font-bold text-[#222222] dark:text-white mb-2" style="font-family: Poppins, sans-serif;">No jobs found</h3>
      <p class="text-[#4B5563] dark:text-[#D9D9D9]">Try adjusting your search or check back later.</p>
    </div>

  </div>

  <script src="./js/helpers.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/jobs.js"></script>
  <script src="./js/lightbox.js"></script>
</body>
</html>
