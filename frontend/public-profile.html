<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — TalentLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/output.css">
  <script>
    if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    }
  </script>
</head>
<body class="bg-[#FCFCFC] dark:bg-[#022F1F] min-h-screen">

  <!-- Navbar -->
  <nav class="bg-[#FCFCFC] dark:bg-[#022F1F] shadow-sm sticky top-0 z-50 border-b border-[#E5E7EB] dark:border-[#014421]">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="dashboard.html" class="flex items-center gap-2">
        <img src="./assets/images/logo.png" alt="TalentLink" class="h-8 w-auto">
        <span class="text-xl font-bold text-[#222222] dark:text-white" style="font-family: Poppins, sans-serif;">
          Talent<span class="text-[#009B77]">Link</span>
        </span>
      </a>
      <div class="flex items-center gap-3">
        <button onclick="history.back()" class="text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] text-sm font-medium">← Back</button>
        <button id="themeToggle" class="p-2 rounded-lg bg-[#D9D9D9] dark:bg-[#014421] text-[#222222] dark:text-white transition-colors">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Profile Content -->
  <div class="max-w-4xl mx-auto px-4 py-10 grid md:grid-cols-3 gap-8">

    <!-- Left Card -->
    <div class="md:col-span-1">
      <div class="bg-white dark:bg-[#014421] rounded-2xl border border-[#E5E7EB] dark:border-[#009B77]/20 overflow-hidden">
        <div class="bg-linear-to-br from-[#014421] to-[#009B77] h-24"></div>
        <div class="px-6 pb-6">
          <div class="relative -mt-10 mb-4">
              <div id="avatarDisplay" class="w-20 h-20 bg-[#009B77] rounded-full border-4 border-white dark:border-[#014421] flex items-center justify-center text-white text-2xl font-bold overflow-hidden"></div>
          </div>
          <h2 id="profileName" class="text-xl font-bold text-[#222222] dark:text-white" style="font-family: Poppins, sans-serif;">Loading...</h2>
          <p id="profileHeadline" class="text-[#4B5563] dark:text-[#D9D9D9] text-sm mt-1"></p>
          <p id="profileLocation" class="text-[#4B5563] dark:text-[#D9D9D9] text-xs mt-1"></p>
          <p id="profileRole" class="text-xs px-3 py-1 rounded-full bg-[#009B77]/10 text-[#009B77] font-medium mt-3 inline-block capitalize"></p>

          <hr class="border-[#E5E7EB] dark:border-[#009B77]/20 my-4">

          <button id="connectBtn" onclick="sendConnection()"
            class="w-full bg-[#009B77] hover:bg-[#007A5E] text-white py-2 rounded-lg text-sm font-medium transition-colors">
            Connect
          </button>

          <div class="flex gap-4 mt-4">
  <div class="text-center">
    <p id="connectionsCount" class="font-bold text-[#222222] dark:text-white">0</p>
    <p class="text-[#4B5563] dark:text-[#D9D9D9] text-xs">Connections</p>
  </div>
  <div class="text-center">
    <p id="postsCountSidebar" class="font-bold text-[#222222] dark:text-white">0</p>
    <p class="text-[#4B5563] dark:text-[#D9D9D9] text-xs">Posts</p>
  </div>
</div>

<div id="contactInfo" class="flex flex-col gap-2 mt-4"></div>

          <div id="socialLinks" class="flex flex-col gap-2 mt-4"></div>
        </div>
      </div>
    </div>

    <!-- Right Details -->
    <div class="md:col-span-2 flex flex-col gap-6">

      <!-- Bio -->
      <div id="bioSection" class="hidden bg-white dark:bg-[#014421] rounded-2xl p-6 border border-[#E5E7EB] dark:border-[#009B77]/20">
        <h3 class="font-bold text-[#222222] dark:text-white mb-3" style="font-family: Poppins, sans-serif;">About</h3>
        <p id="profileBio" class="text-[#4B5563] dark:text-[#D9D9D9] leading-relaxed text-sm"></p>
      </div>

      <!-- Skills -->
      <div id="skillsSection" class="hidden bg-white dark:bg-[#014421] rounded-2xl p-6 border border-[#E5E7EB] dark:border-[#009B77]/20">
        <h3 class="font-bold text-[#222222] dark:text-white mb-4" style="font-family: Poppins, sans-serif;">Skills</h3>
        <div id="skillsList" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- Resume -->
      <div id="resumeSection" class="hidden bg-white dark:bg-[#014421] rounded-2xl p-6 border border-[#E5E7EB] dark:border-[#009B77]/20">
        <h3 class="font-bold text-[#222222] dark:text-white mb-3" style="font-family: Poppins, sans-serif;">Resume</h3>
        <a id="resumeLink" href="#" target="_blank"
          class="flex items-center gap-2 text-[#009B77] hover:underline text-sm font-medium">
          📄 View Resume
        </a>
      </div>

      <!-- Posts Section -->
<div class="bg-white dark:bg-[#014421] rounded-2xl p-6 border border-[#E5E7EB] dark:border-[#009B77]/20">
  <div class="flex items-center justify-between mb-4">
    <h3 class="font-bold text-[#222222] dark:text-white" style="font-family: Poppins, sans-serif;">Posts</h3>
    <span id="postsCount" class="text-[#4B5563] dark:text-[#D9D9D9] text-sm"></span>
  </div>
  <div id="userPostsContainer" class="flex flex-col gap-4">
    <p class="text-[#4B5563] dark:text-[#D9D9D9] text-sm">Loading posts...</p>
  </div>
</div>

    </div>
  </div>
  <script src="./js/api.js"></script>
  <script src="./js/helpers.js"></script>
  <script>
    document.getElementById('themeToggle').addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark')
      localStorage.theme = isDark ? 'dark' : 'light'
      document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙'
    })

    const user = JSON.parse(localStorage.getItem('user'))
    if (!user) window.location.href = 'login.html'

    const params = new URLSearchParams(window.location.search)
    const profileId = params.get('id')
    const parsedProfileId = parseInt(profileId, 10)

    if (!profileId || Number.isNaN(parsedProfileId)) {
      console.warn('Invalid profile id:', profileId)
      window.location.href = 'dashboard.html'
    }

    // Hide connect button if viewing own profile
    if (parsedProfileId === user.user_id) {
      document.getElementById('connectBtn').textContent = 'Edit Profile'
      document.getElementById('connectBtn').onclick = () => window.location.href = 'profile.html'
    }

   //load profile data
  async function loadProfile() {
  try {
    const userRes = await fetchWithAuth(`${API_BASE}/api/users/${parsedProfileId}`, { 
      credentials: 'include' 
    })
    if (!userRes.ok) {
      const errorBody = await userRes.text()
      console.error('Failed to load profile:', userRes.status, errorBody)
      window.location.href = 'dashboard.html'
      return
    }
    const userData = await userRes.json()

    // Only fetch candidate profile if they are a candidate
    let candidateData = {}
    if (userData.role === 'candidate') {
      const candidateRes = await fetchWithAuth(`${API_BASE}/api/candidates/${profileId}`, { 
        credentials: 'include' 
      })
      candidateData = await candidateRes.json()
    }

    // For employers fetch their company profile instead
    let employerData = {}
    if (userData.role === 'employer') {
      const employerRes = await fetchWithAuth(`${API_BASE}/api/employers/${profileId}`, { 
        credentials: 'include' 
      })
      employerData = await employerRes.json()
    }

    document.title = `${userData.first_name} ${userData.last_name} — TalentLink`
    document.getElementById('profileName').textContent = `${userData.first_name} ${userData.last_name}`
    document.getElementById('profileHeadline').textContent = userData.role === 'employer' 
      ? employerData.company_name || 'Employer'
      : userData.headline || ''
    document.getElementById('profileLocation').textContent = userData.location ? `📍 ${userData.location}` : ''
    document.getElementById('profileRole').textContent = userData.role

    if (userData.profile_picture_url) {
      document.getElementById('avatarDisplay').innerHTML = `
        <div class="w-full h-full overflow-hidden cursor-pointer hover:opacity-90 transition-opacity" onclick="openLightbox('${userData.profile_picture_url}')">
          <img src="${userData.profile_picture_url}" class="w-full h-full object-cover rounded-full">
        </div>`
    } else {
      document.getElementById('avatarDisplay').innerHTML = userData.first_name[0] + userData.last_name[0]
    }

    // Candidate specific sections
    if (userData.role === 'candidate') {
      if (candidateData.bio) {
        document.getElementById('bioSection').classList.remove('hidden')
        document.getElementById('profileBio').textContent = candidateData.bio
      }

      if (candidateData.skills) {
        document.getElementById('skillsSection').classList.remove('hidden')
        const skills = candidateData.skills.split(',').map(s => s.trim())
        document.getElementById('skillsList').innerHTML = skills.map(skill =>
          `<span class="px-3 py-1 bg-[#009B77]/10 text-[#009B77] rounded-full text-xs font-medium">${skill}</span>`
        ).join('')
      }

      if (candidateData.resume_url) {
        document.getElementById('resumeSection').classList.remove('hidden')
        document.getElementById('resumeLink').href = candidateData.resume_url
      }

      const socialLinks = document.getElementById('socialLinks')
      if (candidateData.github_url) {
        socialLinks.innerHTML += `<a href="${candidateData.github_url}" target="_blank" class="text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] text-sm">🐙 GitHub</a>`
      }
      if (candidateData.linkedin_url) {
        socialLinks.innerHTML += `<a href="${candidateData.linkedin_url}" target="_blank" class="text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] text-sm">💼 LinkedIn</a>`
      }
    }

    // Employer specific sections
    if (userData.role === 'employer' && employerData.company_bio) {
      document.getElementById('bioSection').classList.remove('hidden')
      document.getElementById('profileBio').textContent = employerData.company_bio
    }

    //contact info
    const contactInfo = document.getElementById('contactInfo')
contactInfo.innerHTML = ''

if (userData.contact_email) {
  contactInfo.innerHTML += `
    <a href="mailto:${userData.contact_email}" 
       class="flex items-center gap-2 px-3 py-2 bg-[#009B77]/10 text-[#009B77] rounded-lg text-sm hover:bg-[#009B77]/20 transition-colors">
      ✉️ ${userData.contact_email}
    </a>
  `
}

if (userData.phone) {
  contactInfo.innerHTML += `
    <a href="tel:${userData.phone}" 
       class="flex items-center gap-2 px-3 py-2 bg-[#014421]/10 text-[#014421] dark:text-[#D9D9D9] rounded-lg text-sm hover:bg-[#014421]/20 transition-colors">
      📞 ${userData.phone}
    </a>
  `
}

  } catch (error) {
    console.error(error)
  }
}

    async function sendConnection() {
      const btn = document.getElementById('connectBtn')
      btn.textContent = '⏳ Sending...'
      btn.disabled = true

      try {
        const response = await fetchWithAuth(API_BASE + '/api/connections', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ receiver_id: parsedProfileId })
        })

        const data = await response.json()

        if (response.ok) {
          btn.textContent = '✅ Request Sent'
          btn.className = 'w-full bg-gray-200 text-gray-500 py-2 rounded-lg text-sm font-medium cursor-not-allowed'
        } else {
          btn.textContent = data.message === 'Connection request already exists' ? '✅ Already Connected' : 'Connect'
          btn.disabled = false
        }

      } catch (error) {
        btn.textContent = 'Connect'
        btn.disabled = false
      }
    }


    async function loadUserPosts() {
  try {
    const response = await fetchWithAuth(`${API_BASE}/api/posts/user/${parsedProfileId}`, {
      credentials: 'include'
    })
    const posts = await response.json()
    const container = document.getElementById('userPostsContainer')
    container.innerHTML = ''

    document.getElementById('postsCount').textContent = `${posts.length} post${posts.length !== 1 ? 's' : ''}`
    document.getElementById('postsCountSidebar').textContent = posts.length

    if (!Array.isArray(posts) || posts.length === 0) {
      container.innerHTML = '<p class="text-[#4B5563] dark:text-[#D9D9D9] text-sm">No posts yet.</p>'
      return
    }

    posts.forEach(post => {
      const initials = post.first_name[0] + post.last_name[0]
      const card = document.createElement('div')
      card.className = 'bg-white dark:bg-[#014421] rounded-2xl shadow-sm border border-[#E5E7EB] dark:border-[#009B77]/20 p-5'
      card.innerHTML = `
        <div class="flex items-center gap-3 mb-4">
          ${post.profile_picture_url ? `
            <div onclick="openLightbox('${post.profile_picture_url}')" class="w-10 h-10 bg-[#009B77] rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0 overflow-hidden cursor-pointer hover:opacity-90 transition-opacity">
              <img src="${post.profile_picture_url}" class="w-full h-full object-cover rounded-full">
            </div>
          ` : `
            <div class="w-10 h-10 bg-[#009B77] rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0">
              ${initials}
            </div>
          `}
          <div>
            <a href="public-profile.html?id=${post.user_id}" class="font-bold text-[#222222] dark:text-white text-sm hover:text-[#009B77] transition-colors">${post.first_name} ${post.last_name}</a>
            <p class="text-[#4B5563] dark:text-[#D9D9D9] text-xs">${new Date(post.created_at).toLocaleDateString()}</p>
          </div>
        </div>
        <p class="text-[#222222] dark:text-white text-sm leading-relaxed mb-4">${post.content}</p>
        ${post.media_url ? `<img src="${post.media_url}" class="w-full rounded-lg mb-4 object-cover max-h-64">` : ''}
        <div class="flex items-center gap-4 pt-3 border-t border-[#E5E7EB] dark:border-[#009B77]/20">
          <button onclick="likePost(${post.post_id}, this)"
            class="like-btn flex items-center gap-1 ${post.liked_by_user ? 'text-[#009B77] dark:text-[#9EEAD2]' : 'text-[#4B5563] dark:text-[#D9D9D9]'} hover:text-[#009B77] text-sm transition-colors"
            data-post-id="${post.post_id}" data-liked="${post.liked_by_user}">
            👍 <span class="like-count">${post.like_count || 0}</span>
          </button>
          <button onclick="toggleComments(${post.post_id})" data-comment-post-id="${post.post_id}" class="flex items-center gap-1 text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] text-sm transition-colors">
            💬 <span class="comment-count">${post.comment_count || 0}</span>
          </button>
        </div>
        <div id="comments-${post.post_id}" data-loaded="false" class="hidden mt-3 pt-3 border-t border-[#E5E7EB] dark:border-[#009B77]/20">
          <div class="comment-list space-y-3 mb-3"></div>
          <div class="flex gap-2">
            <input type="text" id="commentInput-${post.post_id}" placeholder="Write a comment..."
              class="flex-1 px-3 py-2 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white text-xs focus:outline-none focus:border-[#009B77]">
            <button onclick="addComment(${post.post_id})" class="bg-[#009B77] text-white px-3 py-2 rounded-lg text-xs hover:bg-[#007A5E]">Send</button>
          </div>
        </div>
      `
      container.appendChild(card)
    })
  } catch (error) {
    console.error(error)
  }
}

async function likePost(postId, btn) {
  const isLiked = btn.dataset.liked === 'true'
  const current = parseInt(btn.querySelector('.like-count')?.textContent || '0', 10)
  let shouldReset = true

  setButtonLoading(btn, `⏳ ${isLiked ? 'Unliking' : 'Liking'}...`)

  try {
    const response = await fetchWithAuth(API_BASE + '/api/likes', {
      method: isLiked ? 'DELETE' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ post_id: postId })
    })

    const data = await response.json().catch(() => ({}))
    if (!response.ok) {
      alert(data.message || 'Unable to update like')
      return
    }

    btn.dataset.liked = (!isLiked).toString()
    if (!isLiked) {
      btn.classList.add('text-[#009B77]', 'dark:text-[#9EEAD2]')
      btn.classList.remove('text-[#4B5563]', 'dark:text-[#D9D9D9]')
    } else {
      btn.classList.remove('text-[#009B77]', 'dark:text-[#9EEAD2]')
      btn.classList.add('text-[#4B5563]', 'dark:text-[#D9D9D9]')
    }

    resetButtonState(btn, '👍 Like')
    shouldReset = false

    const count = btn.querySelector('.like-count')
    const newCount = isLiked ? Math.max(0, current - 1) : current + 1
    if (count) count.textContent = newCount
  } catch (error) {
    console.error(error)
  } finally {
    if (shouldReset) resetButtonState(btn, '👍 Like')
  }
}

async function loadComments(postId) {
  const section = document.getElementById(`comments-${postId}`)
  const list = section.querySelector('.comment-list')
  list.innerHTML = `<p class="text-sm text-[#4B5563] dark:text-[#D9D9D9]">Loading comments...</p>`

  try {
    const response = await fetchWithAuth(`${API_BASE}/api/comments/post/${postId}`, {
      credentials: 'include'
    })
    if (!response.ok) {
      list.innerHTML = `<p class="text-sm text-[#ef4444] dark:text-[#fca5a5]">Unable to load comments.</p>`
      return
    }

    const comments = await response.json()
    if (comments.length === 0) {
      list.innerHTML = `<p class="text-sm text-[#4B5563] dark:text-[#D9D9D9]">No comments yet.</p>`
    } else {
      list.innerHTML = comments.map(comment => `
        <div class="flex gap-2 comment-item" data-comment-id="${comment.comment_id}">
          <div class="w-7 h-7 bg-[#009B77] rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0">
            ${comment.first_name[0]}
          </div>
          <div class="bg-[#FCFCFC] dark:bg-[#022F1F] rounded-lg px-3 py-2 flex-1 relative">
            <p class="font-medium text-[#222222] dark:text-white text-xs">${comment.first_name} ${comment.last_name}</p>
            <p class="text-[#4B5563] dark:text-[#D9D9D9] text-xs mt-1">${comment.content}</p>
            ${String(comment.user_id) === String(user.user_id) ? `<button onclick="deleteComment(${comment.comment_id}, ${postId}, this)" class="absolute right-2 top-2 text-red-400 text-xs hover:text-red-600">Delete</button>` : ''}
          </div>
        </div>
      `).join('')
    }

    const commentBtn = document.querySelector(`[data-comment-post-id="${postId}"] .comment-count`)
    if (commentBtn) commentBtn.textContent = comments.length
    section.dataset.loaded = 'true'
  } catch (error) {
    console.error(error)
    list.innerHTML = `<p class="text-sm text-[#ef4444] dark:text-[#fca5a5]">Unable to load comments.</p>`
  }
}

async function toggleComments(postId) {
  const section = document.getElementById(`comments-${postId}`)
  const isHidden = section.classList.toggle('hidden')
  if (!isHidden && section.dataset.loaded !== 'true') {
    await loadComments(postId)
  }
}

async function addComment(postId) {
  const input = document.getElementById(`commentInput-${postId}`)
  const btn = document.querySelector(`#comments-${postId} button[onclick="addComment(${postId})"]`)
  const content = input.value.trim()
  if (!content) return

  setButtonLoading(btn, '⏳ Sending...')

  try {
    const response = await fetchWithAuth(API_BASE + '/api/comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ post_id: postId, content })
    })

    if (!response.ok) {
      const data = await response.json().catch(() => ({}))
      alert(data.message || 'Unable to send comment')
      return
    }

    const comment = await response.json()
    input.value = ''

    const commentsSection = document.getElementById(`comments-${postId}`)
    const commentList = commentsSection.querySelector('.comment-list')
    const commentEl = document.createElement('div')
    commentEl.className = 'flex gap-2 comment-item'
    commentEl.setAttribute('data-comment-id', comment.comment_id)
    commentEl.innerHTML = `
      <div class="w-7 h-7 bg-[#009B77] rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0">
        ${user.first_name[0]}
      </div>
      <div class="bg-[#FCFCFC] dark:bg-[#022F1F] rounded-lg px-3 py-2 flex-1 relative">
        <p class="font-medium text-[#222222] dark:text-white text-xs">${user.first_name} ${user.last_name}</p>
        <p class="text-[#4B5563] dark:text-[#D9D9D9] text-xs mt-1">${content}</p>
        <button onclick="deleteComment(${comment.comment_id}, ${postId}, this)" class="absolute right-2 top-2 text-red-400 text-xs hover:text-red-600">Delete</button>
      </div>
    `

    if (commentList && commentList.textContent.includes('No comments yet.')) {
      commentList.innerHTML = ''
    }
    commentList.appendChild(commentEl)

    const commentCount = document.querySelector(`[data-comment-post-id="${postId}"] .comment-count`)
    if (commentCount) {
      commentCount.textContent = parseInt(commentCount.textContent || '0', 10) + 1
    }
  } catch (error) {
    console.error(error)
  } finally {
    resetButtonState(btn, 'Send')
  }
}

async function deleteComment(commentId, postId, btn) {
  if (!confirm('Delete this comment?')) return
  setButtonLoading(btn, '⏳ Deleting...')
  try {
    const response = await fetchWithAuth(`${API_BASE}/api/comments/${commentId}`, {
      method: 'DELETE',
      credentials: 'include'
    })
    if (!response.ok) {
      const data = await response.json().catch(() => ({}))
      alert(data.message || 'Unable to delete comment')
      return
    }

    const el = btn.closest('.comment-item')
    if (el) el.remove()

    const commentCount = document.querySelector(`[data-comment-post-id="${postId}"] .comment-count`)
    if (commentCount) {
      commentCount.textContent = Math.max(0, parseInt(commentCount.textContent || '0', 10) - 1)
    }
  } catch (error) {
    console.error(error)
  } finally {
    resetButtonState(btn, 'Delete')
  }
}

async function loadConnectionsCount() {
  try {
    const response = await fetchWithAuth(`${API_BASE}/api/connections`, {
      credentials: 'include'
    })
    const connections = await response.json()
    if (Array.isArray(connections)) {
      document.getElementById('connectionsCount').textContent = connections.length
    }
  } catch (error) {
    console.error(error)
  }
}
    loadProfile()
    loadUserPosts()
loadConnectionsCount()
  </script>
