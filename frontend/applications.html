<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications — TalentLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/output.css">
  <script>
    if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    }
  </script>
</head>
<body class="bg-[#FCFCFC] dark:bg-[#022F1F] min-h-screen">

  <!-- Navbar -->
  <nav class="bg-[#FCFCFC] dark:bg-[#022F1F] shadow-sm sticky top-0 z-50 border-b border-[#E5E7EB] dark:border-[#014421]">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <img src="./assets/images/logo.png" alt="TalentLink Logo" class="h-8 w-auto">
        <span class="text-xl font-bold text-[#222222] dark:text-white" style="font-family: Poppins, sans-serif;">
          Talent<span class="text-[#009B77]">Link</span>
        </span>
      </a>
      <div class="hidden md:flex items-center gap-4">
        <a href="dashboard.html" class="text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] font-medium transition-colors text-sm">Dashboard</a>
        <a href="jobs.html" class="text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] font-medium transition-colors text-sm">Browse Jobs</a>
        <button onclick="logout(this)" class="text-red-500 hover:text-red-700 font-medium transition-colors text-sm">Logout</button>
        <button id="themeToggle" class="p-2 rounded-lg bg-[#D9D9D9] dark:bg-[#014421] text-[#222222] dark:text-white transition-colors">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
      <div class="flex md:hidden items-center gap-2">
        <button id="themeToggleMobile" class="p-2 rounded-lg bg-[#D9D9D9] dark:bg-[#014421]">
          <span id="themeIconMobile">🌙</span>
        </button>
        <button id="hamburger" class="p-2 text-[#222222] dark:text-white">
          <svg id="menuOpen" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg id="menuClose" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="mobileMenu" class="md:hidden bg-[#FCFCFC] dark:bg-[#022F1F] border-t border-[#E5E7EB] dark:border-[#014421] px-4 py-4 flex flex-col gap-4">
      <a href="dashboard.html" class="text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] font-medium">Dashboard</a>
      <a href="jobs.html" class="text-[#4B5563] dark:text-[#D9D9D9] hover:text-[#009B77] font-medium">Browse Jobs</a>
      <button onclick="logout(this)" class="text-red-500 text-left font-medium">Logout</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="max-w-4xl mx-auto px-4 py-10">

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-[#222222] dark:text-white mb-2" style="font-family: Poppins, sans-serif;">My Applications</h1>
      <p class="text-[#4B5563] dark:text-[#D9D9D9]">Track all your job applications in one place.</p>
    </div>

    <!-- Stats Row -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white dark:bg-[#014421] rounded-xl p-4 border border-[#E5E7EB] dark:border-[#009B77]/20 text-center">
        <p id="totalCount" class="text-2xl font-bold text-[#009B77]">0</p>
        <p class="text-[#4B5563] dark:text-[#D9D9D9] text-xs mt-1">Total</p>
      </div>
      <div class="bg-white dark:bg-[#014421] rounded-xl p-4 border border-[#E5E7EB] dark:border-[#009B77]/20 text-center">
        <p id="pendingCount" class="text-2xl font-bold text-[#F59E0B]">0</p>
        <p class="text-[#4B5563] dark:text-[#D9D9D9] text-xs mt-1">Pending</p>
      </div>
      <div class="bg-white dark:bg-[#014421] rounded-xl p-4 border border-[#E5E7EB] dark:border-[#009B77]/20 text-center">
        <p id="interviewCount" class="text-2xl font-bold text-[#009B77]">0</p>
        <p class="text-[#4B5563] dark:text-[#D9D9D9] text-xs mt-1">Interviewing</p>
      </div>
      <div class="bg-white dark:bg-[#014421] rounded-xl p-4 border border-[#E5E7EB] dark:border-[#009B77]/20 text-center">
        <p id="offeredCount" class="text-2xl font-bold text-[#22C55E]">0</p>
        <p class="text-[#4B5563] dark:text-[#D9D9D9] text-xs mt-1">Offered</p>
      </div>
    </div>

    <!-- Applications List -->
    <div id="applicationsContainer" class="flex flex-col gap-4">
      <div class="bg-white dark:bg-[#014421] rounded-2xl p-8 text-center border border-[#E5E7EB] dark:border-[#009B77]/20">
        <p class="text-[#4B5563] dark:text-[#D9D9D9]">Loading applications...</p>
      </div>
    </div>

  </div>

  <script src="./js/helpers.js"></script>
  <script>
    // Dark mode
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark')
      localStorage.theme = isDark ? 'dark' : 'light'
      document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙'
      document.getElementById('themeIconMobile').textContent = isDark ? '☀️' : '🌙'
    }
    document.getElementById('themeToggle').addEventListener('click', toggleTheme)
    document.getElementById('themeToggleMobile').addEventListener('click', toggleTheme)

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.toggle('hidden')
      document.getElementById('menuOpen').classList.toggle('hidden')
      document.getElementById('menuClose').classList.toggle('hidden')
    })

    const user = JSON.parse(localStorage.getItem('user'))
    if (!user) window.location.href = 'login.html'

    async function logout(btn) {
      setButtonLoading(btn, '⏳ Logging out...')

      try {
        await fetch('http://127.0.0.1:5000/api/auth/logout', { method: 'POST', credentials: 'include' })
      } catch (error) {
        console.error(error)
      } finally {
        localStorage.removeItem('user')
        window.location.href = 'login.html'
      }
    }

    const statusColors = {
      'Pending': 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400',
      'Reviewed': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400',
      'Interviewing': 'bg-[#009B77]/10 text-[#009B77]',
      'Offered': 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400',
      'Rejected': 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'
    }

    async function loadApplications() {
      try {
        const response = await fetch(`http://127.0.0.1:5000/api/applications/candidate/${user.user_id}`, {
          credentials: 'include'
        })
        const applications = await response.json()
        const container = document.getElementById('applicationsContainer')
        container.innerHTML = ''

        // Update stats
        document.getElementById('totalCount').textContent = applications.length
        document.getElementById('pendingCount').textContent = applications.filter(a => a.status === 'Pending').length
        document.getElementById('interviewCount').textContent = applications.filter(a => a.status === 'Interviewing').length
        document.getElementById('offeredCount').textContent = applications.filter(a => a.status === 'Offered').length

        if (applications.length === 0) {
          container.innerHTML = `
            <div class="bg-white dark:bg-[#014421] rounded-2xl p-12 text-center border border-[#E5E7EB] dark:border-[#009B77]/20">
              <p class="text-4xl mb-4">📋</p>
              <h3 class="text-xl font-bold text-[#222222] dark:text-white mb-2" style="font-family: Poppins, sans-serif;">No applications yet</h3>
              <p class="text-[#4B5563] dark:text-[#D9D9D9] mb-6">Start applying to jobs to track your progress here.</p>
              <a href="jobs.html" class="bg-[#009B77] text-white px-6 py-2 rounded-lg hover:bg-[#007A5E] transition-colors font-medium">Browse Jobs</a>
            </div>
          `
          return
        }

        applications.forEach(app => {
          const card = document.createElement('div')
          card.className = 'bg-white dark:bg-[#014421] rounded-2xl p-6 border border-[#E5E7EB] dark:border-[#009B77]/20 hover:shadow-md transition-shadow'
          card.innerHTML = `
            <div class="flex items-start justify-between gap-4">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[#009B77]/10 rounded-xl flex items-center justify-center text-xl shrink-0">🏢</div>
                <div>
                  <h3 class="font-bold text-[#222222] dark:text-white" style="font-family: Poppins, sans-serif;">${app.job_title}</h3>
                  <p class="text-[#4B5563] dark:text-[#D9D9D9] text-sm">${app.job_location} · ${app.job_type}</p>
                  ${app.salary_range ? `<p class="text-[#009B77] text-sm font-medium">💰 ${app.salary_range}</p>` : ''}
                </div>
              </div>
              <span class="text-xs px-3 py-1 rounded-full font-medium shrink-0 ${statusColors[app.status] || 'bg-gray-100 text-gray-700'}">
                ${app.status}
              </span>
            </div>
            <div class="flex items-center justify-between mt-4 pt-4 border-t border-[#E5E7EB] dark:border-[#009B77]/20">
              <p class="text-[#4B5563] dark:text-[#D9D9D9] text-xs">Applied ${new Date(app.applied_at).toLocaleDateString()}</p>
              <button onclick="withdrawApplication(${app.application_id}, this)"
                class="text-red-400 hover:text-red-600 text-xs font-medium transition-colors">
                Withdraw
              </button>
            </div>
          `
          container.appendChild(card)
        })

      } catch (error) {
        console.error(error)
      }
    }

    async function withdrawApplication(applicationId, btn) {
      if (!confirm('Withdraw this application?')) return
      setButtonLoading(btn, '⏳ Withdrawing...')
      try {
        const response = await fetch(`http://127.0.0.1:5000/api/applications/${applicationId}`, {
          method: 'DELETE',
          credentials: 'include'
        })
        if (response.ok) {
          btn.closest('.rounded-2xl')?.remove()
          loadApplications()
        }
      } catch (error) {
        console.error(error)
      } finally {
        resetButtonState(btn, 'Withdraw')
      }
    }

    loadApplications()
  </script>

</body>
</html>
