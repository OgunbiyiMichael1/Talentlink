<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Dashboard — TalentLink</title>
  <link rel="icon" href="./assets/images/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/output.css">
  <script>
    if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    }
  </script>
</head>
<body class="bg-[#FCFCFC] dark:bg-[#022F1F] min-h-screen">

  <!-- Navbar -->
  <nav class="bg-[#FCFCFC] dark:bg-[#022F1F] shadow-sm sticky top-0 z-50 border-b border-[#E5E7EB] dark:border-[#014421]">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
    <a href="employer-dashboard.html" class="flex items-center gap-2 shrink-0">
      <img src="./assets/images/logo.png" alt="TalentLink" class="h-8 w-auto">
      <span class="text-xl font-bold text-[#222222] dark:text-white hidden md:block" style="font-family: Poppins, sans-serif;">
        Talent<span class="text-[#009B77]">Link</span>
      </span>
    </a>
    <div class="hidden md:flex items-center gap-4">
      <span id="companyName" class="text-[#4B5563] dark:text-[#D9D9D9] text-sm font-medium"></span>
      <button id="themeToggle" class="p-2 rounded-lg bg-[#D9D9D9] dark:bg-[#014421] text-[#222222] dark:text-white transition-colors">
        <span id="themeIcon">🌙</span>
      </button>
      <button onclick="logout()" class="text-red-500 hover:text-red-700 font-medium transition-colors text-sm">Logout</button>
    </div>
    <div class="flex md:hidden items-center gap-2">
      <button id="themeToggleMobile" class="p-2 rounded-lg bg-[#D9D9D9] dark:bg-[#014421]">
        <span id="themeIconMobile">🌙</span>
      </button>
      <button id="hamburger" class="p-2 text-[#222222] dark:text-white">
          <svg id="menuClose" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg id="menuOpen" class="h-6 w-6 " fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="md:hidden bg-[#FCFCFC] dark:bg-[#022F1F] border-t border-[#E5E7EB] dark:border-[#014421] px-4 py-4 flex flex-col gap-3">
    <button onclick="showSection('jobs')" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-[#009B77]/10 text-[#009B77] font-medium text-sm text-left">
      💼 My Jobs
    </button>
    <button onclick="showSection('post')" class="flex items-center gap-3 px-3 py-2 rounded-lg text-[#4B5563] dark:text-[#D9D9D9] hover:bg-[#009B77]/10 hover:text-[#009B77] font-medium text-sm text-left">
      ➕ Post a Job
    </button>
    <button onclick="showSection('profile')" class="flex items-center gap-3 px-3 py-2 rounded-lg text-[#4B5563] dark:text-[#D9D9D9] hover:bg-[#009B77]/10 hover:text-[#009B77] font-medium text-sm text-left">
      🏢 Company Profile
    </button>
    <a href="connections.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-[#4B5563] dark:text-[#D9D9D9] hover:bg-[#009B77]/10 hover:text-[#009B77] font-medium text-sm">
      🤝 My Network
    </a>
    <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-[#4B5563] dark:text-[#D9D9D9] hover:bg-[#009B77]/10 hover:text-[#009B77] font-medium text-sm">
      🏠 Feed
    </a>
    <hr class="border-[#E5E7EB] dark:border-[#009B77]/20">
    <button onclick="logout()" class="flex items-center gap-3 px-3 py-2 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 font-medium text-sm text-left w-full">
      🚪 Logout
    </button>
  </div>
</nav>


  <!-- Main Layout -->
  <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 md:grid-cols-4 gap-6">

    <!-- Left Sidebar -->
    <aside class="hidden md:block md:col-span-1">
      <div class="bg-white dark:bg-[#014421] rounded-2xl shadow-sm border border-[#E5E7EB] dark:border-[#009B77]/20 overflow-hidden sticky top-20">
        <div class="bg-linear-to-b from-[#014421] to-[#009B77] p-6 text-center text-white">
          <div id="companyLogo" class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center text-2xl font-bold mx-auto mb-3">🏢</div>
          <p id="sidebarCompany" class="font-bold text-lg" style="font-family: Poppins, sans-serif;">Loading...</p>
          <p id="sidebarIndustry" class="text-[#D9D9D9] text-sm mt-1">Employer</p>
        </div>
        <nav class="p-4 flex flex-col gap-1">
          <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-[#4B5563] dark:text-[#D9D9D9] hover:bg-[#009B77]/10 hover:text-[#009B77] font-medium text-sm w-full text-left transition-colors">
  🏠 Feed
</a>
          <button onclick="showSection('jobs')" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-[#009B77]/10 text-[#009B77] font-medium text-sm w-full text-left">
            💼 My Jobs
          </button>
          <button onclick="showSection('post')" class="flex items-center gap-3 px-3 py-2 rounded-lg text-[#4B5563] dark:text-[#D9D9D9] hover:bg-[#009B77]/10 hover:text-[#009B77] font-medium text-sm w-full text-left transition-colors">
            ➕ Post a Job
          </button>
          <button onclick="showSection('profile')" class="flex items-center gap-3 px-3 py-2 rounded-lg text-[#4B5563] dark:text-[#D9D9D9] hover:bg-[#009B77]/10 hover:text-[#009B77] font-medium text-sm w-full text-left transition-colors">
            🏢 Company Profile
          </button>
          <a href="connections.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-[#4B5563] dark:text-[#D9D9D9] hover:bg-[#009B77]/10 hover:text-[#009B77] font-medium text-sm w-full text-left transition-colors">
  🤝 My Network
</a>

          <hr class="border-[#E5E7EB] dark:border-[#009B77]/20 my-2">
          <button onclick="logout()" class="flex items-center gap-3 px-3 py-2 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 font-medium text-sm w-full text-left transition-colors">
            🚪 Logout
          </button>
        </nav>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="md:col-span-3 flex flex-col gap-6">

      <input type="text" id="searchInput" placeholder="Search jobs, people, skills..."
  class="w-full px-4 py-2 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-white dark:bg-[#014421] text-[#222222] dark:text-white placeholder-[#4B5563] focus:outline-none focus:border-[#009B77] transition-colors text-sm"
  onkeypress="handleSearch(event)">
      <!-- Stats Row -->
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
        <div class="bg-white dark:bg-[#014421] rounded-xl p-5 border border-[#E5E7EB] dark:border-[#009B77]/20">
          <p id="totalJobs" class="text-3xl font-bold text-[#009B77]">0</p>
          <p class="text-[#4B5563] dark:text-[#D9D9D9] text-sm mt-1">Total Jobs</p>
        </div>
        <div class="bg-white dark:bg-[#014421] rounded-xl p-5 border border-[#E5E7EB] dark:border-[#009B77]/20">
          <p id="activeJobs" class="text-3xl font-bold text-[#22C55E]">0</p>
          <p class="text-[#4B5563] dark:text-[#D9D9D9] text-sm mt-1">Active Jobs</p>
        </div>
        <div class="bg-white dark:bg-[#014421] rounded-xl p-5 border border-[#E5E7EB] dark:border-[#009B77]/20">
          <p id="totalApplicants" class="text-3xl font-bold text-[#F59E0B]">0</p>
          <p class="text-[#4B5563] dark:text-[#D9D9D9] text-sm mt-1">Total Applicants</p>
        </div>
      </div>

      <!-- My Jobs Section -->
      <div id="jobsSection">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-bold text-[#222222] dark:text-white" style="font-family: Poppins, sans-serif;">My Job Listings</h2>
          <button onclick="showSection('post')" class="bg-[#009B77] hover:bg-[#007A5E] text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
            + Post New Job
          </button>
        </div>
        <div id="jobsContainer" class="flex flex-col gap-4">
          <div class="bg-white dark:bg-[#014421] rounded-2xl p-8 text-center border border-[#E5E7EB] dark:border-[#009B77]/20">
            <p class="text-[#4B5563] dark:text-[#D9D9D9]">Loading jobs...</p>
          </div>
        </div>
      </div>

      <!-- Post Job Section -->
      <div id="postSection" class="hidden">
        <h2 class="text-xl font-bold text-[#222222] dark:text-white mb-6" style="font-family: Poppins, sans-serif;">Post a New Job</h2>
        <div class="bg-white dark:bg-[#014421] rounded-2xl p-8 border border-[#E5E7EB] dark:border-[#009B77]/20">

          <div id="postErrorMsg" class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 text-sm"></div>
          <div id="postSuccessMsg" class="hidden bg-green-50 dark:bg-green-900/20 border border-green-200 text-green-600 px-4 py-3 rounded-lg mb-6 text-sm"></div>

          <div class="flex flex-col gap-5">
            <div>
              <label class="block text-sm font-medium text-[#222222] dark:text-white mb-2">Job Title *</label>
              <input type="text" id="jobTitle" placeholder="e.g. Senior Backend Developer"
                class="w-full px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white focus:outline-none focus:border-[#009B77] transition-colors">
            </div>
            <div class="grid md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-[#222222] dark:text-white mb-2">Job Type *</label>
                <select id="jobType" class="w-full px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white focus:outline-none focus:border-[#009B77] transition-colors">
                  <option value="Full-time">Full-time</option>
                  <option value="Part-time">Part-time</option>
                  <option value="Contract">Contract</option>
                  <option value="Internship">Internship</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-[#222222] dark:text-white mb-2">Location *</label>
                <input type="text" id="jobLocation" placeholder="e.g. Lagos, Nigeria or Remote"
                  class="w-full px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white focus:outline-none focus:border-[#009B77] transition-colors">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-[#222222] dark:text-white mb-2">Salary Range</label>
              <input type="text" id="salaryRange" placeholder="e.g. ₦200,000 - ₦350,000"
                class="w-full px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white focus:outline-none focus:border-[#009B77] transition-colors">
            </div>
            <div>
              <label class="block text-sm font-medium text-[#222222] dark:text-white mb-2">Job Description *</label>
              <textarea id="jobDescription" rows="5" placeholder="Describe the role, responsibilities and what the candidate will be doing..."
                class="w-full px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white focus:outline-none focus:border-[#009B77] transition-colors resize-none"></textarea>
            </div>
            <div>
              <label class="block text-sm font-medium text-[#222222] dark:text-white mb-2">Requirements *</label>
              <textarea id="jobRequirements" rows="4" placeholder="List the skills, experience and qualifications required..."
                class="w-full px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white focus:outline-none focus:border-[#009B77] transition-colors resize-none"></textarea>
            </div>
            <button onclick="postJob()" id="postJobBtn"
              class="bg-[#009B77] hover:bg-[#007A5E] text-white py-3 rounded-lg font-semibold transition-colors">
              Post Job
            </button>
          </div>
        </div>
      </div>

      <!-- Company Profile Section -->
      <div id="profileSection" class="hidden">
        <h2 class="text-xl font-bold text-[#222222] dark:text-white mb-6" style="font-family: Poppins, sans-serif;">Company Profile</h2>
        <div class="bg-white dark:bg-[#014421] rounded-2xl p-8 border border-[#E5E7EB] dark:border-[#009B77]/20">
          <div class="flex flex-col gap-5">
            <div>
              <label class="block text-sm font-medium text-[#222222] dark:text-white mb-2">Company Name</label>
              <input type="text" id="companyNameInput"
                class="w-full px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white focus:outline-none focus:border-[#009B77] transition-colors">
            </div>
            <div>
              <label class="block text-sm font-medium text-[#222222] dark:text-white mb-2">Industry</label>
              <input type="text" id="industryInput" placeholder="e.g. FinTech, EdTech"
                class="w-full px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white focus:outline-none focus:border-[#009B77] transition-colors">
            </div>
            <div>
              <label class="block text-sm font-medium text-[#222222] dark:text-white mb-2">Company Website</label>
              <input type="text" id="websiteInput" placeholder="https://yourcompany.com"
                class="w-full px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white focus:outline-none focus:border-[#009B77] transition-colors">
            </div>
            <div>
              <label class="block text-sm font-medium text-[#222222] dark:text-white mb-2">Company Bio</label>
              <textarea id="bioInput" rows="4"
                class="w-full px-4 py-3 rounded-lg border border-[#E5E7EB] dark:border-[#014421] bg-[#FCFCFC] dark:bg-[#022F1F] text-[#222222] dark:text-white focus:outline-none focus:border-[#009B77] transition-colors resize-none"></textarea>
            </div>
            <button onclick="updateCompanyProfile()" id="updateProfileBtn"
              class="bg-[#009B77] hover:bg-[#007A5E] text-white py-3 rounded-lg font-semibold transition-colors">
              Save Changes
            </button>
          </div>
        </div>
      </div>

      <!-- Applicants Modal -->
      <div id="applicantsSection" class="hidden">
        <div class="flex items-center gap-3 mb-4">
          <button onclick="showSection('jobs')" class="text-[#009B77] hover:underline text-sm">← Back to Jobs</button>
          <h2 id="applicantsTitle" class="text-xl font-bold text-[#222222] dark:text-white" style="font-family: Poppins, sans-serif;"></h2>
        </div>
        <div id="applicantsContainer" class="flex flex-col gap-4"></div>
      </div>

    </main>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/employer.js"></script>
  <script src="./js/lightbox.js"></script>
</body>
</html>
